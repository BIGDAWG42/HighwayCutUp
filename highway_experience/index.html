<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Velocity | Premium Driving Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="author" content="Anthony F">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'Exo 2', sans-serif; }
        canvas { display:block; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; color: white;
        }
        .hero-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 20; pointer-events: auto;
        }
        .hero-title { font-size: 3.2rem; margin-bottom: 15px; text-shadow: 0 0 20px #00f3ff; }
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="overlay">
        <div class="hero-content">
            <h1 class="hero-title">HIGHWAY VELOCITY</h1>
            <p style="margin-bottom:20px;">Drive • Overtake • Survive</p>
            <button onclick="startDriving()" style="padding:15px 40px; font-size:1.2rem; background:#00f3ff; color:black; border:none; border-radius:50px; cursor:pointer;">START DRIVING</button>
        </div>
        <div class="controls">
            ← → Arrow Keys = Steer &nbsp;&nbsp;&nbsp; ↑ = Accelerate &nbsp;&nbsp;&nbsp; SPACE = Brake
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, car, road;
        let velocity = 0;
        let keys = {};

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1);
            directional.position.set(0, 50, 30);
            scene.add(directional);

            // Road
            const roadGeo = new THREE.PlaneGeometry(20, 200);
            const roadMat = new THREE.MeshBasicMaterial({ color: 0x111122 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = -1;
            scene.add(road);

            // Car
            const carGeo = new THREE.BoxGeometry(2, 1, 4);
            const carMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            car = new THREE.Mesh(carGeo, carMat);
            car.position.set(0, 0.5, 5);
            scene.add(car);

            camera.position.set(0, 8, 15);
            camera.lookAt(car.position);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            document.addEventListener('keydown', e => keys[e.key] = true);
            document.addEventListener('keyup', e => keys[e.key] = false);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Controls
            if (keys['ArrowLeft'] || keys['a']) car.position.x -= 0.3;
            if (keys['ArrowRight'] || keys['d']) car.position.x += 0.3;
            if (keys['ArrowUp'] || keys['w']) velocity = Math.min(velocity + 0.1, 1.5);
            if (keys[' ']) velocity = Math.max(velocity - 0.2, 0);

            velocity *= 0.98; // friction
            road.position.z += velocity * 2;

            // Reset road
            if (road.position.z > 50) road.position.z = -50;

            renderer.render(scene, camera);
        }

        function startDriving() {
            document.querySelector('.hero-content').style.display = 'none';
            init3D();
        }

        // Auto start for testing
        // init3D();
    </script>
</body>
</html>
