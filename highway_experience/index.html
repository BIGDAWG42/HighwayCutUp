<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Velocity | Premium Driving Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="author" content="Anthony F">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'Exo 2', sans-serif; }
        canvas { display:block; }
        .hud {
            position: absolute; top: 20px; left: 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(0,0,0,0.7); padding: 15px 20px; border-radius: 10px; z-index: 30; color: #fff;
        }
        .score { font-size: 2rem; color: #00f3ff; }
        .start-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; color: white;
        }
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 10px; font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="hud">
        <div>SCORE: <span id="score" class="score">0</span></div>
        <div>SPEED: <span id="speed">0</span> mph</div>
    </div>

    <div class="start-screen" id="start-screen">
        <h1 style="font-size:3.8rem; margin-bottom:10px; text-shadow:0 0 30px #00f3ff;">HIGHWAY VELOCITY</h1>
        <p style="margin-bottom:30px;">Developed by Anthony F</p>
        <button onclick="startGame()" style="padding:20px 60px; font-size:1.4rem; background:#00f3ff; color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:900;">START DRIVING</button>
    </div>

    <div class="controls">
        ← → = Steer &nbsp;&nbsp;&nbsp; ↑ = Gas &nbsp;&nbsp;&nbsp; ↓ / SPACE = Brake
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, playerCar, road;
        let aiCars = [];
        let score = 0, velocity = 0;
        let keys = {};
        let gameRunning = false;

        class AICar {
            constructor() {
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 1.2, 4),
                    new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
                );
                this.mesh.position.set(
                    (Math.random() - 0.5) * 12,
                    0.8,
                    -30 - Math.random() * 100
                );
                this.speed = 0.8 + Math.random() * 1.2;
                scene.add(this.mesh);
            }
            update() {
                this.mesh.position.z += this.speed + velocity * 0.6;
                if (this.mesh.position.z > 30) {
                    this.mesh.position.z = -80;
                    this.mesh.position.x = (Math.random() - 0.5) * 12;
                }
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x404060));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 30, 20);
            scene.add(sun);

            // Road
            road = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 300),
                new THREE.MeshLambertMaterial({ color: 0x0f1626 })
            );
            road.rotation.x = -Math.PI / 2;
            road.position.y = -1;
            scene.add(road);

            // Player Car
            playerCar = new THREE.Mesh(
                new THREE.BoxGeometry(2.2, 1.3, 4.8),
                new THREE.MeshPhongMaterial({ color: 0xff2222, shininess: 50 })
            );
            playerCar.position.set(0, 0.8, 10);
            scene.add(playerCar);

            camera.position.set(0, 12, 22);
            camera.lookAt(playerCar.position);

            // Add AI Traffic
            for (let i = 0; i < 12; i++) {
                aiCars.push(new AICar());
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            // Player Controls
            if (keys['ArrowLeft'] || keys['a']) playerCar.position.x -= 0.4;
            if (keys['ArrowRight'] || keys['d']) playerCar.position.x += 0.4;
            if (keys['ArrowUp'] || keys['w']) velocity = Math.min(velocity + 0.15, 2.8);
            if (keys['ArrowDown'] || keys[' ']) velocity = Math.max(velocity - 0.3, 0);

            velocity *= 0.96;

            playerCar.position.x = Math.max(-8.5, Math.min(8.5, playerCar.position.x));

            // Road movement
            road.position.z += velocity * 3;
            if (road.position.z > 80) road.position.z = -80;

            // Update AI cars
            aiCars.forEach(car => car.update());

            // Scoring
            score += Math.floor(velocity * 12);
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('speed').textContent = Math.floor(velocity * 95);

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            init3D();
            gameLoop();
        }

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
