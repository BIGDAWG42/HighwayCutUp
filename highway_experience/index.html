<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Velocity | Premium Driving Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="author" content="Anthony F">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'Exo 2', sans-serif; }
        canvas { display:block; }
        .hud {
            position: absolute; top: 20px; left: 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(0,0,0,0.7); padding: 15px 20px; border-radius: 10px; z-index: 30; color: #fff;
        }
        .score { font-size: 2.1rem; color: #00f3ff; }
        .start-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; color: white;
        }
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 10px; font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="hud">
        <div>SCORE: <span id="score" class="score">0</span></div>
        <div>SPEED: <span id="speed">0</span> mph</div>
    </div>

    <div class="start-screen" id="start-screen">
        <h1 style="font-size:3.8rem; margin-bottom:10px; text-shadow:0 0 30px #00f3ff;">HIGHWAY VELOCITY</h1>
        <p style="margin-bottom:30px; font-size:1.1rem;">Developed by Anthony F</p>
        <button onclick="startGame()" style="padding:20px 60px; font-size:1.4rem; background:#00f3ff; color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:900;">START DRIVING</button>
    </div>

    <div class="controls">
        ← → = Steer &nbsp;&nbsp;&nbsp; ↑ = Gas &nbsp;&nbsp;&nbsp; ↓ / SPACE = Brake
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, playerCar, road;
        let aiCars = [];
        let score = 0, velocity = 0;
        let keys = {};
        let gameRunning = false;

        class AICar {
            constructor() {
                const colors = [0xff3333, 0x33ff33, 0xffff33, 0x33ffff, 0xff33ff, 0x8888ff];
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(2.1, 1.4, 4.8),
                    new THREE.MeshPhongMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
                );
                this.reset();
                scene.add(this.mesh);
            }
            reset() {
                this.mesh.position.set(
                    (Math.random() - 0.5) * 13,
                    0.9,
                    -60 - Math.random() * 80   // Much better spacing
                );
                this.speed = 0.5 + Math.random() * 1.1;
            }
            update() {
                this.mesh.position.z += this.speed + velocity * 0.7;
                if (this.mesh.position.z > 35) this.reset();
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(68, window.innerWidth/window.innerHeight, 0.1, 300);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.fog = new THREE.Fog(0x0a0a15, 50, 160);

            scene.add(new THREE.AmbientLight(0x445577));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(8, 35, 25);
            scene.add(sun);

            road = new THREE.Mesh(
                new THREE.PlaneGeometry(22, 400),
                new THREE.MeshLambertMaterial({ color: 0x111122 })
            );
            road.rotation.x = -Math.PI / 2;
            road.position.y = -1;
            scene.add(road);

            playerCar = new THREE.Mesh(
                new THREE.BoxGeometry(2.3, 1.4, 5),
                new THREE.MeshPhongMaterial({ color: 0xff2222 })
            );
            playerCar.position.set(0, 1, 12);
            scene.add(playerCar);

            camera.position.set(0, 13, 25);

            // Only 8 AI cars with good spacing
            for (let i = 0; i < 8; i++) {
                aiCars.push(new AICar());
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            if (keys['ArrowLeft'] || keys['a']) playerCar.position.x -= 0.42;
            if (keys['ArrowRight'] || keys['d']) playerCar.position.x += 0.42;
            if (keys['ArrowUp'] || keys['w']) velocity = Math.min(velocity + 0.18, 3.0);
            if (keys['ArrowDown'] || keys[' ']) velocity = Math.max(velocity - 0.35, 0);

            velocity *= 0.955;
            playerCar.position.x = Math.max(-9, Math.min(9, playerCar.position.x));

            road.position.z += velocity * 3.5;
            if (road.position.z > 100) road.position.z = -100;

            camera.position.z = playerCar.position.z + 13;
            camera.lookAt(playerCar.position.x * 0.5, 4, playerCar.position.z - 12);

            aiCars.forEach(car => car.update());

            score += Math.floor(velocity * 14);
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('speed').textContent = Math.floor(velocity * 98);

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            init3D();
            gameLoop();
        }

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
