<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Velocity | Premium Driving Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="author" content="Anthony F">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'Exo 2', sans-serif; }
        canvas { display:block; }
        .hud {
            position: absolute; top: 20px; left: 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 10px; z-index: 30; color: #fff;
        }
        .score { font-size: 2.1rem; color: #00f3ff; }
        .start-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; color: white;
        }
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 10px; font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="hud">
        <div>SCORE: <span id="score" class="score">0</span></div>
        <div>SPEED: <span id="speed">0</span> mph</div>
    </div>

    <div class="start-screen" id="start-screen">
        <h1 style="font-size:3.6rem; margin-bottom:10px; text-shadow:0 0 30px #00f3ff;">HIGHWAY VELOCITY</h1>
        <p style="margin-bottom:30px; font-size:1.1rem;">Developed by Anthony F</p>
        <button onclick="startGame()" style="padding:20px 60px; font-size:1.4rem; background:#00f3ff; color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:900;">START DRIVING</button>
    </div>

    <div class="controls">
        ← → = Steer &nbsp;&nbsp;&nbsp; ↑ = Gas &nbsp;&nbsp;&nbsp; ↓ / SPACE = Brake
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, playerCar, road;
        let aiCars = [];
        let score = 0, velocity = 0;
        let keys = {};
        let gameRunning = false;
        const lanes = [-7, -3.5, 0, 3.5, 7]; // 5 lanes

        class AICar {
            constructor() {
                const colors = [0x00ff88, 0xffffff, 0x4488ff, 0xff8800, 0xff4488, 0x88ff44];
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(2.1, 1.35, 4.9),
                    new THREE.MeshPhongMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
                );
                this.currentLane = Math.floor(Math.random() * lanes.length);
                this.reset();
                scene.add(this.mesh);
            }
            reset() {
                this.mesh.position.x = lanes[this.currentLane];
                this.mesh.position.z = -60 - Math.random() * 120;
                this.speed = 0.65 + Math.random() * 1.15;
            }
            update() {
                this.mesh.position.z += this.speed + velocity * 0.8;
                
                // Occasional lane change
                if (Math.random() < 0.008) {
                    const dir = Math.random() < 0.5 ? -1 : 1;
                    const newLane = this.currentLane + dir;
                    if (newLane >= 0 && newLane < lanes.length) {
                        this.currentLane = newLane;
                        this.mesh.position.x = lanes[this.currentLane];
                    }
                }
                
                if (this.mesh.position.z > 50) this.reset();
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 400);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.fog = new THREE.Fog(0x0a0f1f, 50, 220);
            scene.add(new THREE.AmbientLight(0x445566));

            const sun = new THREE.DirectionalLight(0xffeecc, 1.4);
            sun.position.set(15, 45, 30);
            scene.add(sun);

            // Wide Highway Road
            road = new THREE.Mesh(
                new THREE.PlaneGeometry(32, 800),
                new THREE.MeshLambertMaterial({ color: 0x1c2533 })
            );
            road.rotation.x = -Math.PI / 2;
            road.position.y = -1;
            scene.add(road);

            // Road shoulders
            const shoulderL = new THREE.Mesh(
                new THREE.PlaneGeometry(4, 800),
                new THREE.MeshLambertMaterial({ color: 0x222222 })
            );
            shoulderL.rotation.x = -Math.PI / 2;
            shoulderL.position.set(-18, -0.9, 0);
            scene.add(shoulderL);

            const shoulderR = shoulderL.clone();
            shoulderR.position.x = 18;
            scene.add(shoulderR);

            // Player Car (Pink Porsche style)
            playerCar = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 1.4, 5.3),
                new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 90 })
            );
            playerCar.position.set(0, 1.1, 12);
            scene.add(playerCar);

            // Spoiler
            const spoiler = new THREE.Mesh(
                new THREE.BoxGeometry(2.8, 0.25, 1),
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            spoiler.position.set(0, 2.2, -1.6);
            playerCar.add(spoiler);

            camera.position.set(0, 13, 26);

            // Generate AI Traffic on proper lanes
            for (let i = 0; i < 10; i++) {
                aiCars.push(new AICar());
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            // Controls
            if (keys['ArrowLeft'] || keys['a']) playerCar.position.x -= 0.42;
            if (keys['ArrowRight'] || keys['d']) playerCar.position.x += 0.42;
            if (keys['ArrowUp'] || keys['w']) velocity = Math.min(velocity + 0.2, 3.6);
            if (keys['ArrowDown'] || keys[' ']) velocity = Math.max(velocity - 0.35, 0);

            velocity *= 0.952;
            playerCar.position.x = Math.max(-9.5, Math.min(9.5, playerCar.position.x));

            road.position.z += velocity * 4.2;
            if (road.position.z > 200) road.position.z = -200;

            camera.position.z = playerCar.position.z + 13;
            camera.lookAt(playerCar.position.x * 0.6, 5.5, playerCar.position.z - 20);

            aiCars.forEach(car => car.update());

            score += Math.floor(velocity * 18);
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('speed').textContent = Math.floor(velocity * 115);

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            init3D();
            gameLoop();
        }

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
