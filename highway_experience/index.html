<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Velocity | Premium Driving Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="author" content="Anthony F">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'Exo 2', sans-serif; }
        canvas { display:block; }
        .hud {
            position: absolute; top: 20px; left: 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 10px; z-index: 30; color: #fff;
        }
        .score { font-size: 2.1rem; color: #00f3ff; }
        .start-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; color: white;
        }
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 12px 25px; border-radius: 10px; font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="hud">
        <div>SCORE: <span id="score" class="score">0</span></div>
        <div>SPEED: <span id="speed">0</span> mph</div>
    </div>

    <div class="start-screen" id="start-screen">
        <h1 style="font-size:3.6rem; margin-bottom:10px; text-shadow:0 0 30px #00f3ff;">HIGHWAY VELOCITY</h1>
        <p style="margin-bottom:30px; font-size:1.1rem;">Developed by Anthony F</p>
        <button onclick="startGame()" style="padding:20px 60px; font-size:1.4rem; background:#00f3ff; color:#000; border:none; border-radius:50px; cursor:pointer; font-weight:900;">START DRIVING</button>
    </div>

    <div class="controls">
        ← → = Steer &nbsp;&nbsp;&nbsp; ↑ = Gas &nbsp;&nbsp;&nbsp; ↓ / SPACE = Brake
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, playerCar, road;
        let aiCars = [];
        let score = 0, velocity = 0;
        let keys = {};
        let gameRunning = false;
        const lanes = [-8, -4, 0, 4, 8]; // 5 proper highway lanes

        class AICar {
            constructor() {
                const colors = [0x00ff88, 0xffffff, 0x4488ff, 0xff8800, 0xff4488, 0x88ff44];
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(2.2, 1.4, 5),
                    new THREE.MeshPhongMaterial({ color: colors[Math.floor(Math.random()*colors.length)] })
                );
                this.currentLane = Math.floor(Math.random() * lanes.length);
                this.reset();
                scene.add(this.mesh);
            }
            reset() {
                this.mesh.position.x = lanes[this.currentLane];
                this.mesh.position.z = -80 - Math.random() * 140;
                this.speed = 0.7 + Math.random() * 1.2;
            }
            update() {
                this.mesh.position.z += this.speed + velocity * 0.75;
                if (Math.random() < 0.007) {
                    const dir = Math.random() < 0.5 ? -1 : 1;
                    const newLane = Math.max(0, Math.min(lanes.length-1, this.currentLane + dir));
                    this.currentLane = newLane;
                    this.mesh.position.x = lanes[this.currentLane];
                }
                if (this.mesh.position.z > 50) this.reset();
            }
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.fog = new THREE.Fog(0x0a0f20, 80, 280);
            scene.add(new THREE.AmbientLight(0x445577));

            const sun = new THREE.DirectionalLight(0xffeecc, 1.5);
            sun.position.set(20, 60, 40);
            scene.add(sun);

            // Main Highway Road
            road = new THREE.Mesh(
                new THREE.PlaneGeometry(36, 1000),
                new THREE.MeshLambertMaterial({ color: 0x1f2a3a })
            );
            road.rotation.x = -Math.PI / 2;
            road.position.y = -1;
            scene.add(road);

            // Shoulders / Rumble strips
            const shoulderMat = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
            const leftShoulder = new THREE.Mesh(new THREE.PlaneGeometry(5, 1000), shoulderMat);
            leftShoulder.rotation.x = -Math.PI / 2;
            leftShoulder.position.set(-20.5, -0.9, 0);
            scene.add(leftShoulder);

            const rightShoulder = leftShoulder.clone();
            rightShoulder.position.x = 20.5;
            scene.add(rightShoulder);

            // Lane markings (dashed lines)
            for (let i = 0; i < 40; i++) {
                const line = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.35, 9),
                    new THREE.MeshBasicMaterial({ color: 0xffff99 })
                );
                line.rotation.x = -Math.PI / 2;
                line.position.y = 0.05;
                scene.add(line);
            }

            // Player Car (Pink Porsche style)
            playerCar = new THREE.Mesh(
                new THREE.BoxGeometry(2.45, 1.45, 5.4),
                new THREE.MeshPhongMaterial({ color: 0xff69b4, shininess: 95 })
            );
            playerCar.position.set(0, 1.2, 12);
            scene.add(playerCar);

            // Rear spoiler
            const spoiler = new THREE.Mesh(
                new THREE.BoxGeometry(2.9, 0.3, 1.1),
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            spoiler.position.set(0, 2.3, -1.8);
            playerCar.add(spoiler);

            camera.position.set(0, 14, 27);

            // AI Traffic
            for (let i = 0; i < 11; i++) {
                aiCars.push(new AICar());
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            if (keys['ArrowLeft'] || keys['a']) playerCar.position.x -= 0.43;
            if (keys['ArrowRight'] || keys['d']) playerCar.position.x += 0.43;
            if (keys['ArrowUp'] || keys['w']) velocity = Math.min(velocity + 0.21, 3.8);
            if (keys['ArrowDown'] || keys[' ']) velocity = Math.max(velocity - 0.36, 0);

            velocity *= 0.95;
            playerCar.position.x = Math.max(-10, Math.min(10, playerCar.position.x));

            road.position.z += velocity * 4.5;
            if (road.position.z > 250) road.position.z = -250;

            camera.position.z = playerCar.position.z + 13.5;
            camera.lookAt(playerCar.position.x * 0.6, 6, playerCar.position.z - 22);

            aiCars.forEach(car => car.update());

            score += Math.floor(velocity * 18);
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('speed').textContent = Math.floor(velocity * 118);

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            init3D();
            gameLoop();
        }

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
    </script>
</body>
</html>
